* { box-sizing: border-box; margin: 0; padding: 0; }

.prog-bg { background: var(--color-background-secondary); border-radius: 8px; height: 6px; margin-bottom: 1rem; }
.prog-fg { background: #1D9E75; height: 6px; border-radius: 8px; transition: width 0.4s; }
.stats { display: flex; gap: 10px; margin-bottom: 1rem; }
.stat { flex: 1; background: var(--color-background-secondary); border-radius: 8px; padding: 7px 10px; text-align: center; }
.stat .num { font-size: 18px; font-weight: 500; }

.green { color: #1D9E75; } .red { color: #E24B4A; }

/* FLASHCARD mode */
.flashcard-wrap { perspective: 1000px; cursor: pointer; margin-bottom: 1rem; }
.flashcard { width: 100%; min-height: 160px; border-radius: 14px; position: relative; transform-style: preserve-3d; transition: transform 0.45s; }
.flashcard.flipped { transform: rotateY(180deg); }
.card-face { position: absolute; width: 100%; min-height: 160px; border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; text-align: center; backface-visibility: hidden; }
.card-front { background: #1D9E75; color: white; }
.card-back { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); transform: rotateY(180deg); }
.card-label { font-size: 11px; opacity: 0.7; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.card-word { font-size: 22px; font-weight: 600; }
.card-sub { font-size: 13px; margin-top: 6px; opacity: 0.8; }
.card-hint { font-size: 12px; margin-top: 4px; opacity: 0.6; }
.card-meaning { font-size: 18px; font-weight: 500; color: #1D9E75; }
.card-ukr { font-size: 14px; color: var(--color-text-secondary); margin-top: 6px; }
.flip-hint { text-align: center; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 10px; }
.nav-row { display: flex; gap: 8px; margin-bottom: 10px; }
.btn { flex: 1; padding: 9px; border-radius: 8px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); font-size: 13px; cursor: pointer; color: var(--color-text-primary); }
.btn:hover { background: var(--color-background-secondary); }
.btn.ok { background: #EAF3DE; border-color: #639922; color: #27500A; font-weight: 500; }
.btn.bad { background: #FCEBEB; border-color: #A32D2D; color: #501313; font-weight: 500; }
.btn.primary { background: #1D9E75; color: white; border-color: #0F6E56; font-weight: 500; }

/* QUIZ mode */
.q-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
.q-num { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 6px; }
.q-type { font-size: 11px; color: #1D9E75; font-weight: 500; margin-bottom: 8px; }
.q-text { font-size: 16px; font-weight: 600; color: var(--color-text-primary); margin-bottom: 1rem; }
.opts { display: flex; flex-direction: column; gap: 7px; }
.opt { background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: 8px; padding: 9px 13px; font-size: 13px; color: var(--color-text-primary); cursor: pointer; text-align: left; }
.opt:hover:not(:disabled) { background: var(--color-background-secondary); }
.opt.right { background: #EAF3DE; border-color: #639922; color: #27500A; }
.opt.wrong { background: #FCEBEB; border-color: #A32D2D; color: #501313; }
.exp { margin-top: 10px; padding: 9px 13px; background: var(--color-background-secondary); border-radius: 8px; font-size: 13px; color: var(--color-text-secondary); border-left: 3px solid #1D9E75; display: none; }
.exp.bad { border-left-color: #E24B4A; }
.next-nav { display: none; gap: 10px; margin-top: 10px; }

/* CHEATSHEET */
.sheet { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 12px; overflow: hidden; }
.sheet-section { border-bottom: 0.5px solid var(--color-border-tertiary); }
.sheet-title { padding: 10px 14px; background: var(--color-background-secondary); font-size: 12px; font-weight: 600; color: #1D9E75; cursor: pointer; display: flex; justify-content: space-between; }
.sheet-rows { display: none; }
.sheet-rows.open { display: block; }
.sheet-row { display: flex; padding: 8px 14px; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 13px; gap: 10px; }
.sheet-row:last-child { border-bottom: none; }
.sheet-en { flex: 1; color: var(--color-text-primary); font-weight: 500; }
.sheet-ua { flex: 1; color: var(--color-text-secondary); }
.finish-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 12px; padding: 2rem; text-align: center; }
.finish-score { font-size: 44px; font-weight: 500; color: #1D9E75; margin: 0.75rem 0 0.5rem; }

});

function shuffle(a) {
  const b = [...a];
  for (let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
  return b;
}

function setTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach((b,i) => {
    b.classList.toggle('active', ['flash','quiz','sheet'][i] === t);
  });
  if (t === 'flash') renderFlash();
  if (t === 'quiz') { quizList = shuffle([...ALL_PAIRS]); quizIdx=0; quizCorrect=0; quizWrong=0; quizWrongList=[]; renderQuiz(); }
  if (t === 'sheet') renderSheet();
}

    </div>
    <div class="nav-row">
      <button class="btn" onclick="flashSkip()">Пропустити →</button>
    </div>`;
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('fc').classList.toggle('flipped', flipped);
  document.getElementById('flash-btns').style.display = flipped ? 'flex' : 'none';
}

function flashMark(ok) {
  if (ok) flashCorrect++; else { flashWrong++; flashWrongList.push(flashList[flashIdx]); }
  flashIdx++;
  renderFlash();
}
function flashSkip() { flashIdx++; renderFlash(); }

function renderFlashFinish() {
  const pct = Math.round(flashCorrect / (flashCorrect+flashWrong||1) * 100);
  document.getElementById('main-area').innerHTML = `
    <div class="finish-card">
      <div style="font-size:14px;color:var(--color-text-secondary);">Результат — Флешкарти</div>
      <div class="finish-score">${flashCorrect} / ${flashCorrect+flashWrong}</div>
      <div style="font-size:14px;color:var(--color-text-secondary);margin-bottom:1rem;">${pct}% знав одразу${flashWrongList.length?`<br>Повторити: ${flashWrongList.length} слів`:''}</div>
      <div class="nav-row">
        ${flashWrongList.length ? `<button class="btn bad" onclick="flashRetry()">Повторити помилки (${flashWrongList.length})</button>` : ''}
        <button class="btn primary" onclick="flashRestart()">Всі знову</button>
      </div>
    </div>`;
}

function flashRetry() { flashList = shuffle([...flashWrongList]); flashIdx=0; flashCorrect=0; flashWrong=0; flashWrongList=[]; renderFlash(); }
function flashRestart() { flashList = shuffle([...ALL_PAIRS]); flashIdx=0; flashCorrect=0; flashWrong=0; flashWrongList=[]; renderFlash(); }

// ---- QUIZ ----
function renderQuiz() {
  if (quizIdx >= quizList.length) { renderQuizFinish(); return; }
  quizAnswered = false;
  const p = quizList[quizIdx];
  const total = quizList.length;

  // Build wrong options from same category or random
  const pool = ALL_PAIRS.filter(x => x.ua !== p.ua);
  const wrongs = shuffle(pool).slice(0,3).map(x => x.ua);
  const opts = shuffle([p.ua, ...wrongs]);

  document.getElementById('main-area').innerHTML = `
    <div class="prog-bg"><div class="prog-fg" style="width:${Math.round(quizIdx/total*100)}%"></div></div>
    <div class="stats">
      <div class="stat"><div class="num green">${quizCorrect}</div><div class="lbl">Правильно</div></div>
      <div class="stat"><div class="num">${quizIdx+1} / ${total}</div><div class="lbl">Питання</div></div>
      <div class="stat"><div class="num red">${quizWrong}</div><div class="lbl">Помилок</div></div>
    </div>
    <div class="q-card">
      <div class="q-type">📂 ${p.cat}</div>
      <div class="q-text">${p.en}</div>
      <div class="opts">
        ${opts.map(o => `<button class="opt" onclick="quizPick('${o.replace(/'/g,"\\'")}','${p.ua.replace(/'/g,"\\'")}')">${o}</button>`).join('')}
      </div>
      <div class="exp" id="qexp"></div>
    </div>
    <div class="next-nav" id="qnav">
      <button class="btn primary" onclick="quizNext()">Далі →</button>
    </div>`;
}

function quizPick(chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  const ok = chosen === correct;
  if (ok) quizCorrect++; else { quizWrong++; quizWrongList.push(quizList[quizIdx]); }
  document.querySelectorAll('.opt').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('right');
    if (b.textContent === chosen && !ok) b.classList.add('wrong');
  });
  const exp = document.getElementById('qexp');
  exp.style.display = 'block';
  exp.className = 'exp' + (ok ? '' : ' bad');
  exp.innerHTML = ok ? '✓ Правильно!' : `✗ Правильно: <strong>${correct}</strong>`;
  document.getElementById('qnav').style.display = 'flex';
}

function quizNext() { quizIdx++; renderQuiz(); }

function renderQuizFinish() {
  const pct = Math.round(quizCorrect/quizList.length*100);
  const msg = pct>=80?'🎉 Відмінно!':pct>=60?'👍 Непогано!':'📚 Треба повторити.';
  document.getElementById('main-area').innerHTML = `
    <div class="finish-card">
      <div style="font-size:14px;color:var(--color-text-secondary);">Результат — Тест</div>
      <div class="finish-score">${quizCorrect} / ${quizList.length}</div>
      <div style="font-size:14px;color:var(--color-text-secondary);margin-bottom:1rem;">${pct}% правильних. ${msg}</div>
      <div class="nav-row">
        ${quizWrongList.length?`<button class="btn bad" onclick="quizRetry()">Помилки (${quizWrongList.length})</button>`:''}
        <button class="btn primary" onclick="quizRestart()">Ще раз</button>
      </div>
    </div>`;
}
function quizRetry() { quizList=shuffle([...quizWrongList]); quizIdx=0; quizCorrect=0; quizWrong=0; quizWrongList=[]; renderQuiz(); }
function quizRestart() { quizList=shuffle([...ALL_PAIRS]); quizIdx=0; quizCorrect=0; quizWrong=0; quizWrongList=[]; renderQuiz(); }

// ---- CHEATSHEET ----
function renderSheet() {
  const sections = Object.entries(CATS).map(([cat, pairs]) => `
    <div class="sheet-section">
      <div class="sheet-title" onclick="toggleSection(this)">
        <span>${cat} (${pairs.length})</span><span>▼</span>
      </div>
      <div class="sheet-rows">
        ${pairs.map(p => `<div class="sheet-row"><div class="sheet-en">${p.en}</div><div class="sheet-ua">${p.ua}</div></div>`).join('')}
      </div>
    </div>`).join('');
  document.getElementById('main-area').innerHTML = `<div class="sheet">${sections}</div>`;
}

function toggleSection(el) {
  el.nextElementSibling.classList.toggle('open');
  el.querySelector('span:last-child').textContent =
    el.nextElementSibling.classList.contains('open') ? '▲' : '▼';
}

// Init
renderFlash();
</script>
