  {q:"____________ to Manchester on the train yesterday?",o:["Did she go","Did she went","She go","She goes"],a:0,u:"Past Simple питання: Did + підмет + інфінітив (go)."},

  {q:"__________ it snow in winter?",o:["does","do","has","have"],a:0,u:"It → does (Present Simple питання)."},

  {q:"Make up a plural form of the noun 'tomato'.",o:["tomatoes","tomatos","tomats","tomates"],a:0,u:"Tomato → tomatoes (додаємо -es після -o)."},

let mode = 'order';
let list = [...QS.keys()];
let wrongIdx = [];
let idx = 0, correct = 0, wrong = 0, answered = false;

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('m-' + m).classList.add('active');
  restart();
}

function getList() {
  if (mode === 'shuffle') {
    const a = [...QS.keys()];
    for (let i = a.length-1; i>0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }
  if (mode === 'wrong') return [...wrongIdx];
  return [...QS.keys()];
}

function restart() {
  if (mode === 'wrong' && wrongIdx.length === 0) {
    document.getElementById('q-area').innerHTML = '<div class="card" style="text-align:center;color:var(--color-text-secondary);font-size:14px;padding:2rem;">Ще немає помилок! Спершу пройди тест.</div>';
    return;
  }
  list = getList();
  idx = 0; correct = 0; wrong = 0;
  if (mode !== 'wrong') wrongIdx = [];
  render();
}

function updateStats() {
  document.getElementById('s-ok').textContent = correct;
  document.getElementById('s-bad').textContent = wrong;
  document.getElementById('s-cur').textContent = idx + 1;
  document.getElementById('s-left').textContent = list.length - idx;
  document.getElementById('prog').style.width = Math.round((idx / list.length) * 100) + '%';
}

function render() {
  if (idx >= list.length) { renderFinish(); return; }
  answered = false;
  const q = QS[list[idx]];
  const globalNum = list[idx] + 1;
  updateStats();
  document.getElementById('q-area').innerHTML = `
    <div class="card">
      <div class="q-num">Питання ${globalNum} з ${QS.length} &nbsp;·&nbsp; ${idx+1} з ${list.length} у цьому режимі</div>
      <div class="q-text">${q.q}</div>
      <div class="opts" id="opts">
        ${q.o.map((o,i) => `<button class="opt" onclick="pick(${i})">${o}</button>`).join('')}
      </div>
      <div class="exp" id="exp"></div>
    </div>
    <div class="nav" id="nav">
      <button class="btn primary" onclick="next()">Далі →</button>
    </div>`;
}

function pick(i) {
  if (answered) return;
  answered = true;
  const q = QS[list[idx]];
  document.querySelectorAll('.opt').forEach((b, bi) => {
    b.disabled = true;
    if (bi === q.a) b.classList.add('ok');
    if (bi === i && i !== q.a) b.classList.add('bad');
  });
  const ok = i === q.a;
  if (ok) correct++; else { wrong++; if (!wrongIdx.includes(list[idx])) wrongIdx.push(list[idx]); }
  updateStats();
  const exp = document.getElementById('exp');
  exp.style.display = 'block';
  exp.className = 'exp' + (ok ? '' : ' wrong');
  exp.innerHTML = ok ? '✓ Правильно! ' + q.u : '✗ Неправильно. Правильна відповідь: <strong>' + q.o[q.a] + '</strong>. ' + q.u;
  document.getElementById('nav').style.display = 'flex';
}

function next() { idx++; render(); }

function renderFinish() {
  const pct = Math.round((correct / list.length) * 100);
  const msg = pct >= 80 ? '🎉 Відмінно! Ти готовий до іспиту!' : pct >= 60 ? '👍 Непогано! Пройди ще раз помилки.' : '📚 Потрібно ще попрактикуватись. Не здавайся!';
  document.getElementById('prog').style.width = '100%';
  document.getElementById('q-area').innerHTML = `
    <div class="finish">
      <div style="font-size:14px;color:var(--color-text-secondary);">Результат</div>
      <div class="finish-score">${correct} / ${list.length}</div>
      <div class="finish-msg">${pct}% правильних відповідей<br>${msg}</div>
      ${wrongIdx.length > 0 ? `<p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:1rem;">Помилок накопичено: ${wrongIdx.length} — натисни "Тільки помилки" вгорі щоб повторити їх.</p>` : ''}
      <div class="nav" style="display:flex;">
        <button class="btn primary" onclick="restart()">Пройти ще раз</button>
      </div>
    </div>`;
}

render();
</script>
